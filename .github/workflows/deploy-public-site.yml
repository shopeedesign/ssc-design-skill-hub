name: Deploy Public Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - index.html
      - markdown-viewer.html
      - assets/**
      - .nojekyll
      - .github/workflows/deploy-public-site.yml

jobs:
  sync-public-repo:
    runs-on: ubuntu-latest
    env:
      PUBLIC_REPO_DIR: ${{ runner.temp }}/public-repo
      STAGING_DIR: ${{ runner.temp }}/public-site-staging

    steps:
      - name: Check out private source repo
        uses: actions/checkout@v4

      - name: Set up SSH deploy key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PUBLIC_SITE_DEPLOY_KEY }}" > ~/.ssh/public_site_deploy_key
          chmod 600 ~/.ssh/public_site_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone public deployment repo
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/public_site_deploy_key -o IdentitiesOnly=yes
        run: |
          git clone git@github.com:shopeedesign/ssc-design-skill-hub-site.git "$PUBLIC_REPO_DIR"

      - name: Prepare deployment files
        shell: bash
        run: |
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR/assets"
          cp index.html "$STAGING_DIR/index.html"
          cp markdown-viewer.html "$STAGING_DIR/markdown-viewer.html"
          cp .nojekyll "$STAGING_DIR/.nojekyll"
          cp -R assets/. "$STAGING_DIR/assets/"
          cat > "$STAGING_DIR/README.md" <<'EOF'
          # SSC Design Skill Hub Site

          This repository is the public deployment target for the SSC Design Skill Hub static site.

          Source files are maintained in a separate private repository and synced here automatically for GitHub Pages publishing.
          EOF

      - name: Sync files into public repo
        run: |
          rsync -av --delete --exclude='.git/' "$STAGING_DIR"/ "$PUBLIC_REPO_DIR"/

      - name: Commit and push if changed
        working-directory: ${{ env.PUBLIC_REPO_DIR }}
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/public_site_deploy_key -o IdentitiesOnly=yes
        run: |
          git config user.name "shopeedesign"
          git config user.email "vertu.huang@shopee.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No deployment changes."
            exit 0
          fi

          git add .
          git commit -m "Deploy site from private source repo"
          git push origin main
